<div class="overlay" (click)="onCancel()">
  <div class="dialog" (click)="$event.stopPropagation()">
    <h3>{{ title }}</h3>
    <p>{{ message }}</p>
    <div class="dialog-buttons">
      <button class="btn btn-danger" (click)="onConfirm()">Ja</button>
      <button class="btn btn-secondary" (click)="onCancel()">Nein</button>
    </div>
  </div>
</div>
