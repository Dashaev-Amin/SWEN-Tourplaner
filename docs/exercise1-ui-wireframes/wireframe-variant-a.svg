  <text x="36" y="246" font-size="13" fill="#888">Min</text>
  <rect x="140" y="225" width="120" height="32" fill="white" stroke="#222" stroke-width="2" rx="4"/>
  <text x="156" y="246" font-size="13" fill="#888">Max</text>

  <text x="20" y="290" font-size="13" font-weight="bold" fill="#222">Difficulty</text>
  <rect x="20" y="300" width="14" height="14" fill="white" stroke="#222" stroke-width="2" rx="2"/>
  <text x="44" y="313" font-size="13" fill="#222">Easy</text>
  <rect x="20" y="324" width="14" height="14" fill="white" stroke="#222" stroke-width="2" rx="2"/>
  <text x="44" y="337" font-size="13" fill="#222">Medium</text>
  <rect x="20" y="348" width="14" height="14" fill="white" stroke="#222" stroke-width="2" rx="2"/>
  <text x="44" y="361" font-size="13" fill="#222">Hard</text>
  <rect x="20" y="372" width="14" height="14" fill="white" stroke="#222" stroke-width="2" rx="2"/>
  <text x="44" y="385" font-size="13" fill="#222">Expert</text>

  <text x="20" y="425" font-size="13" font-weight="bold" fill="#222">Date Range</text>
  <rect x="20" y="435" width="240" height="32" fill="white" stroke="#222" stroke-width="2" rx="4"/>
  <text x="36" y="456" font-size="13" fill="#888">From — To</text>

  <text x="20" y="500" font-size="13" font-weight="bold" fill="#222">Min Rating</text>
  <text x="20" y="525" font-size="16" fill="#222">☆ ☆ ☆ ☆ ☆</text>

  <rect x="20" y="565" width="240" height="40" fill="#222" stroke="#222" stroke-width="2" rx="4"/>
  <text x="140" y="585" font-size="13" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="central">Apply Filters</text>
  <rect x="20" y="615" width="240" height="40" fill="white" stroke="#222" stroke-width="2" rx="4"/>
  <text x="140" y="635" font-size="13" fill="#222" text-anchor="middle" dominant-baseline="central">Reset</text>

  <!-- MAIN CONTENT -->
  <text x="300" y="130" font-size="22" font-weight="bold" fill="#222">Tours</text>
  <text x="300" y="155" font-size="12" fill="#777">23 results</text>

  <rect x="1080" y="115" width="100" height="36" fill="#222" stroke="#222" stroke-width="2" rx="4"/>
