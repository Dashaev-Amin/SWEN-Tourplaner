  <text x="665" y="332" font-size="13" fill="#222">7h 10m</text>
  <text x="785" y="332" font-size="13" fill="#222">Medium</text>
  <text x="900" y="332" font-size="13" fill="#222">★★★★☆</text>
  <text x="1010" y="332" font-size="13" fill="#3366FF">Edit · Del</text>
  <line x1="300" y1="346" x2="1180" y2="346" stroke="#ccc" stroke-width="1"/>

