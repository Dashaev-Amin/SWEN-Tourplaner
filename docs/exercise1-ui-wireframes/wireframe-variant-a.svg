<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="1200" height="800" fill="white"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="1200" height="60" fill="white" stroke="#222" stroke-width="2"/>
  <text x="20" y="38" font-size="20" font-weight="bold" fill="#222">TourPlanner</text>
  <circle cx="1160" cy="30" r="14" fill="white" stroke="#222" stroke-width="2"/>
  <text x="1160" y="30" font-size="12" fill="#222" text-anchor="middle" dominant-baseline="central">A</text>

  <!-- BREADCRUMB -->
  <text x="20" y="85" font-size="13" fill="#555">Home / Tours</text>

  <!-- SIDEBAR DIVIDER -->
  <line x1="280" y1="60" x2="280" y2="800" stroke="#222" stroke-width="2"/>

  <!-- SIDEBAR -->
