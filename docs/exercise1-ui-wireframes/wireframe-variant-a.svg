  <text x="665" y="290" font-size="13" fill="#222">6h 45m</text>
  <text x="785" y="290" font-size="13" fill="#222">Hard</text>
  <text x="900" y="290" font-size="13" fill="#222">★★★★★</text>
  <text x="1010" y="290" font-size="13" fill="#3366FF">Edit · Del</text>
  <line x1="300" y1="304" x2="1180" y2="304" stroke="#ccc" stroke-width="1"/>

