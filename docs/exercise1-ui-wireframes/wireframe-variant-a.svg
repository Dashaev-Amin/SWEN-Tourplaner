  <text x="785" y="374" font-size="13" fill="#222">Easy</text>
  <text x="900" y="374" font-size="13" fill="#222">★★★☆☆</text>
  <text x="1010" y="374" font-size="13" fill="#3366FF">Edit · Del</text>
  <line x1="300" y1="388" x2="1180" y2="388" stroke="#ccc" stroke-width="1"/>

