  <text x="545" y="416" font-size="13" fill="#222">14.5 km</text>
  <text x="665" y="416" font-size="13" fill="#222">5h 15m</text>
  <text x="785" y="416" font-size="13" fill="#222">Medium</text>
  <text x="900" y="416" font-size="13" fill="#222">★★★★★</text>
  <text x="1010" y="416" font-size="13" fill="#3366FF">Edit · Del</text>
  <line x1="300" y1="430" x2="1180" y2="430" stroke="#ccc" stroke-width="1"/>

  <text x="305" y="458" font-size="13" fill="#222">Rax Plateau Loop</text>
  <text x="545" y="458" font-size="13" fill="#222">22.0 km</text>
  <text x="665" y="458" font-size="13" fill="#222">8h 00m</text>
  <text x="785" y="458" font-size="13" fill="#222">Expert</text>
  <text x="900" y="458" font-size="13" fill="#222">★★★★☆</text>
  <text x="1010" y="458" font-size="13" fill="#3366FF">Edit · Del</text>
  <line x1="300" y1="472" x2="1180" y2="472" stroke="#ccc" stroke-width="1"/>

  <text x="305" y="500" font-size="13" fill="#222">Kahlenberg Walk</text>
  <text x="545" y="500" font-size="13" fill="#222">6.0 km</text>
  <text x="665" y="500" font-size="13" fill="#222">1h 45m</text>
  <text x="785" y="500" font-size="13" fill="#222">Easy</text>
  <text x="900" y="500" font-size="13" fill="#222">★★★☆☆</text>
  <text x="1010" y="500" font-size="13" fill="#3366FF">Edit · Del</text>
  <line x1="300" y1="514" x2="1180" y2="514" stroke="#ccc" stroke-width="1"/>

  <text x="300" y="555" font-size="12" fill="#777">Showing 7 of 23</text>
  <rect x="1080" y="538" width="40" height="28" fill="white" stroke="#222" stroke-width="2" rx="4"/>
  <text x="1100" y="552" font-size="14" fill="#222" text-anchor="middle" dominant-baseline="central">←</text>
  <rect x="1130" y="538" width="40" height="28" fill="white" stroke="#222" stroke-width="2" rx="4"/>
  <text x="1150" y="552" font-size="14" fill="#222" text-anchor="middle" dominant-baseline="central">→</text>

  <!-- ANNOTATION MARKERS -->
  <g>
    <circle cx="150" cy="130" r="14" fill="#3366FF"/>
    <text x="150" y="130" font-size="14" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="central">1</text>
  </g>
  <g>
    <circle cx="370" cy="205" r="14" fill="#3366FF"/>
    <text x="370" y="205" font-size="14" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="central">2</text>
  </g>
  <g>
    <circle cx="1075" cy="248" r="14" fill="#3366FF"/>
    <text x="1075" y="248" font-size="14" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="central">3</text>
  </g>
