  <rect x="20" y="150" width="240" height="36" fill="white" stroke="#222" stroke-width="2" rx="4"/>
  <text x="36" y="173" font-size="13" fill="#888">Search tours...</text>

  <text x="20" y="215" font-size="13" font-weight="bold" fill="#222">Distance (km)</text>
