  <text x="665" y="248" font-size="13" fill="#222">3h 20m</text>
  <text x="785" y="248" font-size="13" fill="#222">Easy</text>
  <text x="900" y="248" font-size="13" fill="#222">★★★★☆</text>
  <text x="1010" y="248" font-size="13" fill="#3366FF">Edit · Del</text>
